<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Livro</title>
</head>
<body>

    <h1>Editar Livro</h1>

    <form method="POST">

        <label>Título:</label><br>
        <input type="text" name="titulo" value="{{ livro.titulo }}"><br><br>

        <label>Autor:</label><br>
        <input type="text" name="autor" value="{{ livro.autor }}"><br><br>

        <label>Ano:</label><br>
        <input type="text" name="ano" value="{{ livro.ano }}"><br><br>

        <label>Categoria:</label><br>
        <input type="text" name="categoria" value="{{ livro.categoria }}"><br><br>

        <label>Quantidade:</label><br>
        <input type="number" name="quantidade" value="{{ livro.quantidade }}"><br><br>

        <button type="submit">Salvar Alterações</button>

    </form>

    <br>

    <a href="{{ url_for('listar_livros') }}">Voltar</a>

    <section>

    </section>

</body>
</html>
