<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Livros</title>
</head>
<body>

    <h1>Cadastro de Livros</h1>

    <form method="POST">

        <label>Título:</label><br>
        <input type="text" name="titulo"><br><br>

        <label>Autor:</label><br>
        <input type="text" name="autor"><br><br>

        <label>Ano de Publicação:</label><br>
        <input type="text" name="ano"><br><br>

        <label>Categoria:</label><br>
        <input type="text" name="categoria"><br><br>

        <label>Quantidade de Exemplares:</label><br>
        <input type="number" name="quantidade"><br><br>

        <button type="submit">Cadastrar Livro</button>

    </form>

    <br>

    <a href="{{ url_for('listar_livros') }}">Ver Livros Cadastrados</a> |
    <a href="{{ url_for('buscar') }}">Buscar Livro</a>

    <section>

    </section>

</body>
</html>
