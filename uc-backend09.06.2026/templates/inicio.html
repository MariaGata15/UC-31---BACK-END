<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferências do Usuário</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{{ tema }}">

    <div class="container">

        <h1>Projeto Flask com Cookies</h1>

        {% if nome %}
            <h2>Olá, {{ nome }}! Seja bem-vindo(a) de volta.</h2>
        {% else %}
            <h2>Olá, visitante!</h2>
        {% endif %}

        <form action="{{ url_for('salvar_nome') }}" method="POST">
            <input type="text" name="nome" placeholder="Digite seu nome" required>
            <button type="submit">Salvar Nome</button>
        </form>

        <div class="temas">
            <h3>Escolha um tema:</h3>

            <a href="{{ url_for('alterar_tema', modo='claro') }}">
                <button type="button">Tema Claro</button>
            </a>

            <a href="{{ url_for('alterar_tema', modo='escuro') }}">
                <button type="button">Tema Escuro</button>
            </a>
        </div>

    </div>

</body>
</html>
