<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Contador</title>
    <link rel="stylesheet" href={{'static', filename='style.css'}}>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 80px;
        }

        .box {
            width: 300px;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .obs {
            margin-top: 20px;
            color: #888;
            font-size: 11px;
        }
    </style>

</head>

<body>

    <div class="box">
        <h1>Contador de Acessos</h1>

        <h2>{{ acessos }}</h2>

        <a href="/zerar">
            <button>Zerar</button>
        </a>

        <div class="obs">
            sessão ativa
        </div>
    </div>

</body>

</html>
