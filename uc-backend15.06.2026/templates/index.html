<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Produtos</title>

<style>

body{
background:#d9f8ff;
font-family:Arial;
padding:40px;
}

h1{
color:#008fb3;
}

.card{

background:white;

padding:20px;

margin:15px 0;

border-radius:15px;

box-shadow:0 0 10px rgba(0,0,0,.1);

}

button{

background:#00d4ff;

color:white;

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

}

button:hover{
background:#00a8cc;
}

.link{
text-decoration:none;
color:#008fb3;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🩵 Lista de Produtos</h1>

<a class="link" href="/favoritos">
Ver Favoritos ❤️
</a>

<hr>

{% for produto in produtos %}

<div class="card">

<h2>{{ produto.nome }}</h2>

{% if produto.id in favoritos %}

<p>❤️ Produto favoritado</p>

{% else %}

<a href="/favoritar/{{ produto.id }}">
<button>Adicionar aos Favoritos</button>
</a>

{% endif %}

</div>

{% endfor %}

</body>

</html>
