<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Favoritos</title>

<style>

body{

background:#d9f8ff;

font-family:Arial;

padding:40px;

}

.card{

background:white;

padding:20px;

margin:15px 0;

border-radius:15px;

box-shadow:0 0 10px rgba(0,0,0,.1);

}

button{

background:#ff4b4b;

color:white;

border:none;

padding:10px 18px;

border-radius:8px;

cursor:pointer;

}

button:hover{
background:#d90000;
}

.link{
text-decoration:none;
color:#008fb3;
font-weight:bold;
}

</style>

</head>

<body>

<h1>❤️ Meus Favoritos</h1>

<a class="link" href="/">
← Voltar
</a>

<hr>

{% if favoritos %}

{% for produto in favoritos %}

<div class="card">

<h2>{{ produto.nome }}</h2>

<a href="/remover/{{ produto.id }}">
<button>Remover</button>
</a>

</div>

{% endfor %}

{% else %}

<p>Nenhum produto favoritado.</p>

{% endif %}

</body>

</html>
